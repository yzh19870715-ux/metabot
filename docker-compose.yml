version: "3.8"

services:
  metabot:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-9100}:9100"
    env_file: .env
    environment:
      - META_MEMORY_URL=http://localhost:8100
      - MEMORY_ENABLED=true
      - MEMORY_PORT=8100
      - MEMORY_DATABASE_DIR=/app/data
      - NODE_ENV=production
    volumes:
      - metabot-data:/app/data
      - claude-config:/root/.claude
      - ${CLAUDE_DEFAULT_WORKING_DIRECTORY:-.}:/workspace
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - metabot-network

  memory:
    image: ghcr.io/nextmat-ai/metmemory:latest
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - memory-data:/data
    networks:
      - metabot-network

volumes:
  metabot-data:
  claude-config:
  memory-data:

networks:
  metabot-network:
    driver: bridge
